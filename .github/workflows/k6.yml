name: k6 Performance Test


on:

  workflow_dispatch:

  push:
    branches:
      - master


jobs:

  performance:

    runs-on: ubuntu-latest


    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup k6
        uses: grafana/setup-k6-action@v1


      - name: Run k6 test
        uses: grafana/run-k6-action@v1
        with:
          path: performance/k6/login_load_test.js